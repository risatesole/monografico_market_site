<!-- Products -->
<div id="products" class="section hidden">
  <h2 class="text-2xl font-bold mb-4">Products</h2>

  <a href="/backoffice/createproduct">
    <button type="button" class="bg-blue-500 text-white px-4 py-2 rounded">
      Create Product
    </button>
  </a>

  <table class="w-full bg-white rounded shadow">
    <thead>
      <tr class="bg-gray-200 text-left">
        <th class="p-2">Pic</th>
        <th>Product</th>
        <th>ID</th>
        <th>Category</th>
        <th>Price</th>
      </tr>
    </thead>

    <tbody>
      {% for product in products %}
      <tr class="border-t">
        <td class="p-2">
          {% if product.image %}
          <img
            src="{{ product.image.url }}"
            class="w-10 h-10 object-cover rounded"
            alt="{{ product.name }}"
          />
          {% else %}
          <div
            class="w-10 h-10 bg-gray-200 rounded flex items-center justify-center text-xs"
          >
            N/A
          </div>
          {% endif %}
        </td>

        <td>{{ product.name }}</td>

        <td>{{ product.id|stringformat:"03d" }}</td>

        <td>{{ product.get_category_display }}</td>

        <td>${{ product.current_price|default:0 }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
