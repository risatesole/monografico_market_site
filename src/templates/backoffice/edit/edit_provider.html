<!DOCTYPE html>
<html>
<head>
    <title>Edit Provider</title>
</head>
<body>

    <h1>Edit Provider</h1>

    <form method="POST">
        {% csrf_token %}

        <label>Name</label><br>
        <input type="text" name="name" value="{{ provider.name }}" required>
        <br><br>

        <label>Phone Number</label><br>
        <input type="text" name="phone_number" value="{{ provider.phone_number }}" required>
        <br><br>

        <label>Address</label><br>
        <input type="text" name="address" value="{{ provider.address }}" required>
        <br><br>

        <label>Email</label><br>
        <input type="email" name="email" value="{{ provider.email }}" required>
        <br><br>

        <label>Description</label><br>
        <textarea name="description">{{ provider.description }}</textarea>
        <br><br>

        <button type="submit">Update Provider</button>
    </form>

</body>
</html>
