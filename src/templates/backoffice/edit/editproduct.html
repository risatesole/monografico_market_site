<!DOCTYPE html>

<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Producto</title>

```
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: white;
        padding: 25px;
        border-radius: 10px;
        width: 400px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-top: 10px;
        font-weight: bold;
    }

    input, textarea, select {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    button {
        margin-top: 15px;
        width: 100%;
        padding: 10px;
        border: none;
        background: #007bff;
        color: white;
        font-size: 16px;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background: #0069d9;
    }

    img {
        margin-top: 10px;
        border-radius: 5px;
    }
</style>
```

</head>

<body>

<div class="container">
    <h2>Editar Producto</h2>

```
<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <!-- Nombre -->
    <label>Nombre</label>
    <input type="text" name="name" value="{{ product.name }}" required>

    <!-- Descripción -->
    <label>Descripción</label>
    <textarea name="description" rows="4" required>{{ product.description }}</textarea>

    <!-- Categoría -->
    <label>Categoría</label>
    <select name="category" required>
        <option value="FRUITS_AND_VEGETABLES" {% if product.category == "FRUITS_AND_VEGETABLES" %}selected{% endif %}>Frutas y vegetales</option>
        <option value="LACTEOUS" {% if product.category == "LACTEOUS" %}selected{% endif %}>Lácteos</option>
        <option value="GROCERY_AND_GOURMET" {% if product.category == "GROCERY_AND_GOURMET" %}selected{% endif %}>Grocery & Gourmet Food</option>
        <option value="ELECTRONIC_AND_TECH" {% if product.category == "ELECTRONIC_AND_TECH" %}selected{% endif %}>Electronics & Tech</option>
        <option value="CLOTHING" {% if product.category == "CLOTHING" %}selected{% endif %}>Clothing</option>
        <option value="SHOES" {% if product.category == "SHOES" %}selected{% endif %}>Shoes</option>
        <option value="JEWELRY" {% if product.category == "JEWELRY" %}selected{% endif %}>Jewelry</option>
        <option value="HOME_AND_KITCHEN" {% if product.category == "HOME_AND_KITCHEN" %}selected{% endif %}>Home & Kitchen</option>
        <option value="TOOLS_AND_HOME_IMPROVEMENT" {% if product.category == "TOOLS_AND_HOME_IMPROVEMENT" %}selected{% endif %}>Tools & Home Improvement</option>
        <option value="FURNITURE" {% if product.category == "FURNITURE" %}selected{% endif %}>Furniture</option>
        <option value="BOOKS" {% if product.category == "BOOKS" %}selected{% endif %}>Books</option>
        <option value="VIDEO_GAMES" {% if product.category == "VIDEO_GAMES" %}selected{% endif %}>Video Games</option>
        <option value="MUSIC" {% if product.category == "MUSIC" %}selected{% endif %}>Music</option>
        <option value="MOVIES_AND_TV" {% if product.category == "MOVIES_AND_TV" %}selected{% endif %}>Movies & TV</option>
        <option value="BEAUTY_AND_PERSONAL_CARE" {% if product.category == "BEAUTY_AND_PERSONAL_CARE" %}selected{% endif %}>Beauty & Personal Care</option>
        <option value="HEALTH_AND_HOUSEHOLD" {% if product.category == "HEALTH_AND_HOUSEHOLD" %}selected{% endif %}>Health & Household</option>
        <option value="TOYS_AND_GAMES" {% if product.category == "TOYS_AND_GAMES" %}selected{% endif %}>Toys & Games</option>
        <option value="BABY_PRODUCTS" {% if product.category == "BABY_PRODUCTS" %}selected{% endif %}>Baby Products</option>
        <option value="SPORTS_AND_OUTDOORS" {% if product.category == "SPORTS_AND_OUTDOORS" %}selected{% endif %}>Sports & Outdoors</option>
        <option value="AUTOMOTIVE" {% if product.category == "AUTOMOTIVE" %}selected{% endif %}>Automotive</option>
        <option value="PET_SUPPLIES" {% if product.category == "PET_SUPPLIES" %}selected{% endif %}>Pet Supplies</option>
        <option value="OFFICE_PRODUCTS" {% if product.category == "OFFICE_PRODUCTS" %}selected{% endif %}>Office Products</option>
        <option value="INDUSTRIAL_AND_SCIENTIFIC" {% if product.category == "INDUSTRIAL_AND_SCIENTIFIC" %}selected{% endif %}>Industrial & Scientific</option>
    </select>

    <!-- Precio -->
    <label>Precio</label>
    <input type="number" step="0.01" name="price" value="{{ price.value }}" required>

    <!-- Imagen actual -->
    {% if product.image %}
        <label>Imagen actual</label>
        <img src="{{ product.image.url }}" width="100">
    {% endif %}

    <!-- Nueva imagen -->
    <label>Nueva Imagen</label>
    <input type="file" name="image">

    <button type="submit">Guardar Cambios</button>
</form>
```

</div>

</body>
</html>
