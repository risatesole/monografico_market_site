<form method="POST">
    {% csrf_token %}
    <select name="product">
        <option value="Rubber Duck">Rubber Duck</option>
        <option value="Iron Duck">Iron Duck</option>
    </select>

    <input type="number" name="price" placeholder="Price">

    <button type="submit">Send</button>
</form>

<ul>
    {% for item in items %}
        <li>{{ item.product }} - ${{ item.price }}</li>
    {% endfor %}
</ul>
