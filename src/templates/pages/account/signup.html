<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <title>SignUp page</title>
  </head>
  <body>
    <p>{{name}}</p>
    <h1>SignUp page</h1>

    <h2>Signup</h2>

    <form method="POST">
      {% csrf_token %}

      <input type="text" name="username" placeholder="Username" required />
      <input type="password" name="password" placeholder="Password" required />

      <button type="submit">Sign Up</button>
    </form>
    
  </body>
</html>
