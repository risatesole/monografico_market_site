<h2>Settings</h2>

{% if user.is_authenticated %}

  <p>Email: {{ user.email }}</p>
  <p>Role: {{ user.role }}</p>

  {% if application %}
    <p>Application status: {{ application.status }}</p>
  {% else %}
    <form method="POST" action="{% url 'request_provider' %}">
      {% csrf_token %}
      <button type="submit">Request to be Provider</button>
    </form>
  {% endif %}

{% else %}
  <p>You must be signed in</p>
{% endif %}
