{% load static %}
<!doctype html>
<html>
  <head>
    <title>{{ name }}</title>
  </head>
  <body>
    <h1>{{ name }}</h1>

    {% if user.is_authenticated %}
      <p>User: {{ user.email }}</p>
      <p>Role: {{ user.role }}</p>
    {% else %}
      <p>User not signed in</p>
    {% endif %}

  </body>
</html>
