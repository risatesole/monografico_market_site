<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Become a Distributor</title>
    <style>
        /* Base Styles & Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f8fafc;
            color: #0f172a;
            line-height: 1.6;
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
            text-align: center;
        }

        /* Hero Section */
        .hero-section {
            padding: 100px 0 80px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 24px;
            letter-spacing: -0.02em;
        }

        .hero-subtitle {
            font-size: 1.25rem;
            color: #475569;
            max-width: 600px;
            margin: 0 auto 40px auto;
        }

        /* Link Styled as a Button */
        .primary-btn {
            display: inline-block;
            background-color: #2563eb;
            color: white;
            font-size: 1.125rem;
            font-weight: 700;
            padding: 16px 48px;
            text-decoration: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        .primary-btn:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
        }

        /* Partners Section */
        .partners-container {
            margin-top: 100px;
        }

        .partners-label {
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #94a3b8;
            margin-bottom: 32px;
        }

        .logo-cloud {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 48px;
        }

        /* Grayscale effect for logos */
        .partner-logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #64748b;
            opacity: 0.6;
            filter: grayscale(100%);
            transition: opacity 0.3s ease, filter 0.3s ease;
            cursor: default;
        }

        .partner-logo:hover {
            opacity: 1;
            filter: grayscale(0%);
        }
    </style>
</head>
<body>

    <section class="hero-section">
        <div class="container">
            <h1 class="hero-title">Scale Your Distribution.</h1>
            <p class="hero-subtitle">
                Become a distributor with us and connect your brand to thousands of daily shoppers across our leading supermarket network.
            </p>

            <a href="YOUR_LINK_HERE" class="primary-btn">Become</a>

            <div class="partners-container">
                <p class="partners-label">Trusted by industry leaders</p>
                <div class="logo-cloud">
                    <div class="partner-logo">FreshCo</div>
                    <div class="partner-logo">AgriCorp</div>
                    <div class="partner-logo">GlobalFoods</div>
                    <div class="partner-logo">NatureSupply</div>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
