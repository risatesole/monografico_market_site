<form method="POST" action="{% url 'provider' %}">
    {% csrf_token %}
    
    <label for="num1">First Number:</label>
    <input type="number" name="first_number" id="num1" required>

    <label for="num2">Second Number:</label>
    <input type="number" name="second_number" id="num2" required>

    <button type="submit">Send to View</button>
</form>
